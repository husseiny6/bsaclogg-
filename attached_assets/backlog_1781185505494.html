<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="theme-color" content="#0d0d0d"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Husseiny's Backlog</title>
<style>
:root{--bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;--border:#2a2a2a;--text:#e8e4dc;--text2:#9a9490;--text3:#5a5550;--accent:#c8a96e;--accent2:#8b6f3e;--done-c:#4a8c5c;--queue-c:#5a7ab8;--pool-c:#7a5a8c;--red:#8c4a4a;--font:'Georgia','Times New Roman',serif;--mono:'SF Mono','Fira Code',monospace;--r:10px;--nav-h:60px;--safe-b:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
body{display:flex;flex-direction:column}
#topbar{flex-shrink:0;height:56px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100}
#tb-title{font-size:17px;font-weight:700;letter-spacing:.03em;color:var(--accent);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:6px;border-radius:6px;font-size:18px;display:flex;align-items:center;justify-content:center;transition:color .2s}
.tb-btn:hover{color:var(--accent)}
#main{flex:1;overflow:hidden;display:flex;flex-direction:column}
#nav{flex-shrink:0;height:var(--nav-h);background:var(--bg2);border-top:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;padding-bottom:var(--safe-b)}
#nav::-webkit-scrollbar{display:none}
.nb{flex:0 0 auto;min-width:62px;padding:5px 8px;background:none;border:none;color:var(--text3);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:color .2s;font-size:10px;font-family:var(--font)}
.nb .ni{font-size:20px;line-height:1}
.nb.active{color:var(--accent)}
#views{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;display:none;padding:12px 12px 80px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.view.active{display:block}
.cat-tabs{display:flex;overflow-x:auto;gap:6px;padding:0 0 10px;scrollbar-width:none;flex-wrap:nowrap}
.cat-tabs::-webkit-scrollbar{display:none}
.ct{flex:0 0 auto;padding:6px 12px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:var(--font)}
.ct.active{background:var(--accent2);border-color:var(--accent);color:var(--text)}
.zone{margin-bottom:14px;border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.zh{display:flex;align-items:center;padding:10px 14px;background:var(--bg3);gap:8px;cursor:pointer;user-select:none}
.zl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;flex:1}
.zl.queue{color:var(--queue-c)}.zl.pool{color:var(--pool-c)}.zl.done{color:var(--done-c)}
.zc{font-size:11px;color:var(--text3);font-family:var(--mono);background:var(--bg4);padding:2px 7px;border-radius:10px}
.zadd{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;padding:1px 4px;border-radius:4px;transition:color .2s;line-height:1}
.zadd:hover{color:var(--accent)}
.ztog{color:var(--text3);font-size:13px;transition:transform .2s}
.zone.collapsed .ztog{transform:rotate(-90deg)}
.zb{background:var(--bg2)}
.zone.collapsed .zb{display:none}
.rand-btn{width:100%;padding:10px;background:none;border:none;border-bottom:1px solid var(--border);color:var(--pool-c);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:var(--font);transition:background .2s}
.rand-btn:hover{background:var(--bg3)}
.item{display:flex;align-items:flex-start;padding:11px 14px;border-bottom:1px solid var(--border);gap:8px;cursor:pointer;transition:background .15s;position:relative}
.item:last-child{border-bottom:none}
.item:active{background:var(--bg3)}
.item-drag{opacity:.4}
.item-over{border-top:2px solid var(--accent)}
.inum{font-size:10px;color:var(--text3);font-family:var(--mono);min-width:20px;padding-top:2px;text-align:right;flex-shrink:0}
.ibody{flex:1;min-width:0}
.ititle{font-size:14px;color:var(--text);line-height:1.35;word-break:break-word}
.ititle.dt{color:var(--text2)}
.imeta{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.3;word-break:break-word}
.itags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;font-family:var(--mono);white-space:nowrap}
.tag.fav{background:#4a3a1a;color:#c8a040}
.tag.revisit{background:#1a3a4a;color:#4a9ab8}
.tag.maybe{background:#2a2a4a;color:#7a7ab8}
.tag.paused{background:#3a2a1a;color:#b88040}
.tag.dropped{background:#3a1a1a;color:#b84040}
.tag.drama{background:#1a2a3a;color:#5a8ab8}
.tag.comedy{background:#2a3a1a;color:#7ab858}
.tag.custom{background:var(--bg4);color:var(--text2)}
.irating{display:flex;align-items:center;gap:3px;margin-top:4px}
.stars{color:var(--accent);font-size:12px;letter-spacing:.5px}
.rnum{font-size:11px;color:var(--text3);font-family:var(--mono)}
.inote{font-size:11px;color:var(--text3);margin-top:4px;font-style:italic}
.dh{color:var(--text3);font-size:14px;padding-top:1px;cursor:grab;touch-action:none;flex-shrink:0}
.dh:active{cursor:grabbing}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:1000;display:flex;align-items:flex-end;justify-content:center}
.mo.ctr{align-items:center}
.md{background:var(--bg2);border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:20px 16px calc(20px + var(--safe-b));position:relative}
.mo.ctr .md{border-radius:16px;max-height:80vh;margin:16px;width:calc(100% - 32px)}
.md-title{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:14px;padding-right:32px;line-height:1.3}
.md-close{position:absolute;top:14px;right:14px;background:var(--bg3);border:none;color:var(--text2);cursor:pointer;border-radius:50%;width:28px;height:28px;font-size:15px;display:flex;align-items:center;justify-content:center}
.mi{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid var(--border);cursor:pointer;font-size:14px;color:var(--text);transition:color .15s}
.mi:last-child{border-bottom:none}
.mi:hover{color:var(--accent)}
.mi .ico{font-size:17px;width:22px;text-align:center}
.mi.danger{color:var(--red)}
.ff{margin-bottom:12px}
.fl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;display:block}
.fi,.fsel,.fta{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:10px 12px;font-family:var(--font);outline:none;transition:border-color .2s}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--accent2)}
.fta{resize:vertical;min-height:70px}
.fsel option{background:var(--bg3)}
.fbtn{width:100%;padding:12px;background:var(--accent2);border:none;border-radius:8px;color:var(--text);font-size:14px;cursor:pointer;font-family:var(--font);font-weight:700;letter-spacing:.04em;transition:background .2s}
.fbtn:hover{background:var(--accent)}
.fbr{display:flex;gap:8px}.fbr .fbtn{flex:1}
.fbtn.sec{background:var(--bg3);color:var(--text2)}
.rp{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.ro{padding:5px 10px;border-radius:6px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:12px;font-family:var(--mono);transition:all .15s}
.ro.sel{background:var(--accent2);border-color:var(--accent);color:var(--text)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.sn{font-size:28px;color:var(--accent);font-family:var(--mono);font-weight:700;line-height:1}
.sl{font-size:11px;color:var(--text3);margin-top:4px}
.ss{font-size:12px;color:var(--text2);margin-top:2px;font-family:var(--mono)}
.pb{background:var(--bg4);border-radius:4px;height:6px;overflow:hidden;margin-top:6px}
.pf{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:4px;transition:width .5s}
.cs{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px}
.cs:last-child{border-bottom:none}
.csn{flex:1;font-size:13px;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.csnum{font-size:11px;color:var(--text3);font-family:var(--mono);white-space:nowrap}
.csbw{width:70px;background:var(--bg4);border-radius:3px;height:4px;overflow:hidden;flex-shrink:0}
.csb{height:100%;background:var(--accent);border-radius:3px}
.sbw{position:sticky;top:0;z-index:10;background:var(--bg);padding:8px 0 10px}
.sb{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:10px 14px 10px 38px;font-family:var(--font);outline:none}
.sb:focus{border-color:var(--accent2)}
.si-wrap{position:relative}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
.empty{text-align:center;padding:36px 20px;color:var(--text3);font-size:13px}
.ei{font-size:34px;margin-bottom:10px}
#toast{position:fixed;bottom:calc(var(--nav-h) + 14px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;z-index:2000;white-space:nowrap;pointer-events:none;max-width:calc(100% - 32px);text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ldbar{width:100%;height:3px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:10px}
.ldf{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:3px;animation:lp 1.5s ease-in-out infinite}
@keyframes lp{0%{width:20%;margin-left:0%}50%{width:50%;margin-left:25%}100%{width:20%;margin-left:80%}}
.stitle{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);padding:12px 0 8px;border-bottom:1px solid var(--border);margin-bottom:10px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@media(min-width:600px){.sg{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body>
<div id="topbar">
  <div id="tb-title">📚 Husseiny's Backlog</div>
  <button class="tb-btn" onclick="openSearch()">🔍</button>
  <button class="tb-btn" onclick="showView('stats')">📊</button>
</div>
<div id="main">
  <div id="views">
    <div id="view-books" class="view active"></div>
    <div id="view-games" class="view"></div>
    <div id="view-movies" class="view"></div>
    <div id="view-series" class="view"></div>
    <div id="view-anime" class="view"></div>
    <div id="view-manga" class="view"></div>
    <div id="view-stats" class="view"></div>
    <div id="view-search" class="view"></div>
  </div>
  <nav id="nav">
    <button class="nb active" onclick="showView('books')" id="nb-books"><span class="ni">📚</span>Books</button>
    <button class="nb" onclick="showView('games')" id="nb-games"><span class="ni">🎮</span>Games</button>
    <button class="nb" onclick="showView('movies')" id="nb-movies"><span class="ni">🎬</span>Movies</button>
    <button class="nb" onclick="showView('series')" id="nb-series"><span class="ni">📺</span>Series</button>
    <button class="nb" onclick="showView('anime')" id="nb-anime"><span class="ni">⛩️</span>Anime</button>
    <button class="nb" onclick="showView('manga')" id="nb-manga"><span class="ni">🗂️</span>Manga</button>
    <button class="nb" onclick="showView('stats')" id="nb-stats"><span class="ni">📊</span>Stats</button>
  </nav>
</div>
<div id="toast"></div>

  MOVIES_DONE_SEED.forEach(m=>S.movies.done.push(mkMovie(m,'done')));
  // Pool: IMDB + PC folder
  MOVIES_POOL_SEED.forEach(m=>S.movies.pool.push({id:uid(),title:m[0],author:'',year:m[1]||'',zone:'pool',rating:null,tags:[],note:'',type:'movie'}));
  PC_POOL_SEED.forEach(t=>S.movies.pool.push({id:uid(),title:t,author:'',year:'',zone:'pool',rating:null,tags:[],note:'',type:'movie'}));

  // SERIES
  SERIES_DONE_SEED.forEach(s=>S.series.done.push(mkSeries(s,'done')));
  SERIES_POOL_SEED.forEach(s=>S.series.pool.push({id:uid(),title:s[0],author:'',year:s[1]||'',zone:'pool',rating:null,tags:[],note:'',type:'series'}));

  // ANIME
  ANIME_SEED.forEach(a=>{
    const zone=a.s==='c'?'done':'queue';
    S.anime[zone].push(mkAnime(a,zone));
  });
  // MANGA
  MANGA_SEED.forEach(m=>{
    const zone=m.s==='c'?'done':'queue';
    S.manga[zone].push(mkManga(m,zone));
  });

  return S;
}

// ══ RENDER HELPERS ════════════════════════════════════
function starsHtml(r){
  if(!r)return '';
  const f=Math.floor(r),h=(r-f)>=0.5;
  let s='★'.repeat(f);if(h)s+='½';
  return `<div class="irating"><span class="stars">${s}</span><span class="rnum">${r}/5</span></div>`;
}
function tagsHtml(tags){
  if(!tags||!tags.length)return '';
  const M={fav:['fav','⭐ Fav'],revisit:['revisit','🔄 Revisit'],maybe:['maybe','📌 Maybe'],paused:['paused','⏸ Paused'],dropped:['dropped','❌ Dropped'],drama:['drama','🎭 Drama'],comedy:['comedy','😄 Comedy']};
  return tags.map(t=>{const i=M[t];return i?`<span class="tag ${i[0]}">${i[1]}</span>`:`<span class="tag custom">${t}</span>`;}).join('');
}
function renderItem(item,idx,zone,drag){
  const tl=item.tl===false?`<em style="color:var(--text3)">${item.title||'Loading…'}</em>`:item.title;
  const meta=[item.author,item.year].filter(Boolean);
  if(item.translator)meta.push('tr: '+item.translator);
  const ts=tagsHtml(item.tags||[]);
  const rs=item.rating?starsHtml(item.rating):'';
  const dc=zone==='done'?' dt':'';
  const dh=drag&&zone==='queue'?`<span class="dh" draggable="true" data-id="${item.id}" data-zone="${zone}">⠿</span>`:'';
  const inum=zone==='queue'?`<span class="inum">${idx+1}</span>`:'';
  return `<div class="item" data-id="${item.id}" data-zone="${zone}" onclick="openMenu('${item.id}','${zone}')">
    ${dh}${inum}
    <div class="ibody">
      <div class="ititle${dc}">${tl}</div>
      ${meta.length?`<div class="imeta">${meta.join(' · ')}</div>`:''}
      ${rs}${ts?`<div class="itags">${ts}</div>`:''}
      ${item.note?`<div class="inote">${item.note}</div>`:''}
    </div>
  </div>`;
}
function renderZone(items,zk,label,canRand,drag,sk){
  const rBtn=canRand&&zk==='pool'?`<button class="rand-btn" onclick="randPick('${sk}')">🎲 Random Pick → Add to Queue</button>`:'';
  const addBtn=`<button class="zadd" onclick="openAdd('${sk}','${zk}')" title="Add">＋</button>`;
  const itemsHtml=items.map((it,i)=>renderItem(it,i,zk,drag)).join('');
  return `<div class="zone" id="z-${sk}-${zk}">
    <div class="zh" onclick="toggleZ('${sk}','${zk}')">
      <span class="zl ${zk}">${label}</span>
      <span class="zc">${items.length}</span>
      ${addBtn}<span class="ztog">▾</span>
    </div>
    <div class="zb">${rBtn}${itemsHtml||'<div class="empty"><div class="ei">'+（zk==='done'?'✓':'○')+'</div>Empty</div>'}</div>
  </div>`;
}

// ══ ANILIST LOADER ═══════════════════════════════════
async function loadAniTitles(type){
  if(aniLoading)return;
  aniLoading=true;
  const sec=APP[type];
  const all=[...sec.queue,...sec.done,...sec.pool];
  const unloaded=all.filter(i=>i.aniId&&!i.tl);
  if(!unloaded.length){aniLoading=false;return;}
  const mtype=type==='anime'?'ANIME':'MANGA';
  const ids=[...new Set(unloaded.map(i=>i.aniId))];
  for(let i=0;i<ids.length;i+=50){
    const batch=ids.slice(i,i+50);
    try{
      const q=`query($ids:[Int]){Page(perPage:50){media(id_in:$ids,type:${mtype}){id title{english romaji}}}}`;
      const res=await fetch('https://graphql.anilist.co',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q,variables:{ids:batch}})});
      const data=await res.json();
      (data?.data?.Page?.media||[]).forEach(m=>{
        const title=m.title.english||m.title.romaji;
        ['queue','done','pool'].forEach(z=>{sec[z].forEach(it=>{if(it.aniId===m.id){it.title=title;it.tl=true;}});});
      });
    }catch(e){console.warn('AniList error',e);}
    await new Promise(r=>setTimeout(r,300));
  }
  saveState();aniLoading=false;
  if(curView===type){if(type==='anime')renderAnime();else renderManga();}
}

// ══ SECTION RESOLVER ═════════════════════════════════
function resolveSec(sk){
  if(sk.startsWith('book-')){const k=sk.slice(5);return{sec:APP.books[k],k}}
  return{sec:APP[sk],k:sk};
}
function rerender(sk){
  if(sk.startsWith('book-'))renderBooks();
  else if(sk==='games')renderGames();
  else if(sk==='movies')renderMovies();
  else if(sk==='series')renderSeries();
  else if(sk==='anime')renderAnime();
  else if(sk==='manga')renderManga();
}
function findItem(id){
  for(const ck of Object.keys(APP.books)){
    const cat=APP.books[ck];
    for(const z of['queue','done','pool']){
      const i=cat[z].findIndex(x=>x.id===id);
      if(i!==-1)return{item:cat[z][i],list:cat[z],zone:z,sk:'book-'+ck};
    }
  }
  for(const sn of['games','movies','series','anime','manga']){
    const sec=APP[sn];
    for(const z of['queue','done','pool']){
      const i=sec[z].findIndex(x=>x.id===id);
      if(i!==-1)return{item:sec[z][i],list:sec[z],zone:z,sk:sn};
    }
  }
  return null;
}

// ══ RANDOM PICK ══════════════════════════════════════
function randPick(sk){
  const{sec}=resolveSec(sk);
  if(!sec||!sec.pool.length){toast('Pool is empty!');return;}
  const i=Math.floor(Math.random()*sec.pool.length);
  const item=sec.pool.splice(i,1)[0];
  item.zone='queue';sec.queue.push(item);
  saveState();toast(`"${item.title}" → Queue`);rerender(sk);
}

// ══ MOVE ITEM ════════════════════════════════════════
function moveItem(id,toZone){
  const f=findItem(id);if(!f)return;
  const{item,list,zone,sk}=f;
  const idx=list.findIndex(x=>x.id===id);
  if(idx!==-1)list.splice(idx,1);
  if(zone==='done'&&(toZone==='queue'||toZone==='pool')){
    if(!item.tags)item.tags=[];
    if(!item.tags.includes('revisit'))item.tags.push('revisit');
  }
  item.zone=toZone;
  const{sec}=resolveSec(sk);
  if(sec)sec[toZone].push(item);
  saveState();toast(`Moved to ${toZone}`);rerender(sk);
}

function toggleTag(id,tag){
  const f=findItem(id);if(!f)return;
  const{item,sk}=f;
  if(!item.tags)item.tags=[];
  const i=item.tags.indexOf(tag);
  if(i!==-1)item.tags.splice(i,1);else item.tags.push(tag);
  saveState();rerender(sk);
}

function deleteItem(id){
  const f=findItem(id);if(!f)return;
  const{list,sk}=f;
  const i=list.findIndex(x=>x.id===id);
  if(i!==-1)list.splice(i,1);
  saveState();closeModal();rerender(sk);toast('Removed');
}

  if(zone!=='done')moves.push(`<div class="mi" onclick="moveItem('${id}','done');closeModal()"><span class="ico">✅</span>Mark as Done</div>`);

function addItem(sk,zone){
  const title=document.getElementById('add-t')?.value.trim();

  const author=document.getElementById('add-a')?.value.trim()||'';
  const year=document.getElementById('add-yr')?.value.trim()||'';

  }
  const item={id:uid(),title,author,year,translator,zone,rating:null,tags:[],note:'',type:sk.startsWith('book-')?'book':sk};

  saveState();closeModal();toast(`Added "${title}"`);rerender(sk);

// ══ DRAG & DROP ══════════════════════════════════════
let dragId=null,dragZone=null;
function initDrag(){
  document.querySelectorAll('.dh').forEach(h=>{
    h.addEventListener('dragstart',e=>{
      dragId=h.dataset.id;dragZone=h.dataset.zone;
      h.closest('.item')?.classList.add('item-drag');
      e.dataTransfer.effectAllowed='move';
    });
  });
  document.querySelectorAll('.item').forEach(el=>{
    el.addEventListener('dragover',e=>{
      e.preventDefault();
      document.querySelectorAll('.item-over').forEach(x=>x.classList.remove('item-over'));
      el.classList.add('item-over');
    });
    el.addEventListener('drop',e=>{
      e.preventDefault();
      el.classList.remove('item-over');
      const tid=el.dataset.id,tz=el.dataset.zone;
      if(dragId&&tid&&dragId!==tid)reorderOrMove(dragId,tid,dragZone,tz);
      document.querySelectorAll('.item-drag').forEach(x=>x.classList.remove('item-drag'));
      dragId=null;
    });
  });
  document.addEventListener('dragend',()=>{
    document.querySelectorAll('.item-drag,.item-over').forEach(x=>{x.classList.remove('item-drag','item-over');});
    dragId=null;
  });
}
function reorderOrMove(fromId,toId,fromZ,toZ){
  if(fromZ!==toZ){moveItem(fromId,toZ);return;}
  const f=findItem(fromId);if(!f)return;
  const{list,sk}=f;
  const fi=list.findIndex(x=>x.id===fromId),ti=list.findIndex(x=>x.id===toId);
  if(fi===-1||ti===-1)return;
  const[item]=list.splice(fi,1);list.splice(ti,0,item);
  saveState();rerender(sk);
}

function doSearch(q){
  const out=document.getElementById('s-res');
  if(!q||q.length<2){out.innerHTML='<div class="empty">Type at least 2 chars</div>';return;}
  q=q.toLowerCase();
  const res=[];
  BOOK_CATS.forEach(c=>{
    const d=APP.books[c.k]||{queue:[],done:[],pool:[]};
    ['queue','done','pool'].forEach(z=>{
      d[z].forEach(i=>{
        if(i.title.toLowerCase().includes(q)||(i.author&&i.author.toLowerCase().includes(q)))
          res.push({...i,_sec:c.l,_z:z});
      });
    });
  });
  ['games','movies','series','anime','manga'].forEach(sn=>{
    const SN={games:'Games',movies:'Movies',series:'Series',anime:'Anime',manga:'Manga'};
    ['queue','done','pool'].forEach(z=>{
      (APP[sn][z]||[]).forEach(i=>{
        if(i.title.toLowerCase().includes(q)||(i.author&&i.author.toLowerCase().includes(q)))
          res.push({...i,_sec:SN[sn],_z:z});
      });
    });
  });
  if(!res.length){out.innerHTML='<div class="empty"><div class="ei">🔍</div>No results</div>';return;}
  out.innerHTML=res.slice(0,60).map(r=>`<div class="item"><div class="ibody"><div class="ititle">${r.title}</div><div class="imeta">${r._sec} · ${r._z}${r.author?' · '+r.author:''}</div>${r.rating?starsHtml(r.rating):''}</div></div>`).join('');
}

// ══ TOAST ════════════════════════════════════════════
let _tt=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2500);
}
